学习以上示例后，对用户提供的逐字稿生成同等质量的 Show Notes。

多嘉宾节目规则：
- 如果逐字稿里有2位及以上嘉宾，必须识别并全部列出，不能只保留最突出的一位

        const API_KEY = 'sk-a1d68136d14e410d8b652595fcb91c7d';

        async function generate() {
            const apiKey = API_KEY;
            const input = document.getElementById('input').value.trim();

            if (!input)  { alert('请粘贴逐字稿内容'); return; }

            const btn = document.getElementById('generateBtn');
            const output = document.getElementById('output');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>第一步：提取关键素材…';
            output.value = '';

            const API_URL = 'https://api.deepseek.com/v1/chat/completions';
            const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` };

            async function callAPI(messages) {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ model: 'deepseek-chat', messages })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error?.message || `请求失败 ${res.status}`);
                }
                const data = await res.json();
                return data.choices[0].message.content;
            }

            async function streamAPI(messages, onChunk) {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ model: 'deepseek-chat', stream: true, messages })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error?.message || `请求失败 ${res.status}`);
                }
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buf = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, { stream: true });
                    const lines = buf.split('\n');
                    buf = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const chunk = line.slice(6).trim();
                        if (chunk === '[DONE]') continue;
                        try {
                            const delta = JSON.parse(chunk).choices?.[0]?.delta?.content;
                            if (delta) onChunk(delta);
                        } catch (_) {}
                    }
                }
            }

            try {
                // 第一步：提取素材
                const extractPrompt = `从下面的播客逐字稿中，提取这8样东西，每条单独一行，直接写内容，不加标题：
1. 本期全部嘉宾名单（如果有多位，姓名逐个列出，不得遗漏；没有明确姓名就写身份特征）
2. 本期全部主播名单（如果有多位，姓名逐个列出，不得遗漏；没有明确姓名就写身份特征）
3. 本期最戏剧性的人生反差/观点反差（如果是多人节目，优先提炼最有张力的一组对比）
4. 最让外人觉得不可思议的一件事（具体细节，有数字或行为）
5. 本期最有力的一句话（如果有多人，优先选最能代表整期主题的一句原话）
6. 本期最低谷时刻或最大冲突（如果有多人，提炼最值得听的那一个）
7. 本期如何从低谷反弹/把事情做成（具体动作；多人节目可概括为共同方法或最关键动作）
8. 目标听众（搞钱/创业的人）从这期最想知道的一个问题

多嘉宾节目规则：
- 先识别人物关系，再提炼内容，不能把多人节目误判成单嘉宾节目
- 只要逐字稿里有多位嘉宾，第一条必须把所有嘉宾都列出来

逐字稿：\n${input}`;

                const material = await callAPI([{ role: 'user', content: extractPrompt }]);

                // 第二步：用素材写完整 Show Notes
                btn.innerHTML = '<span class="spinner"></span>第二步：生成 Show Notes…';

                const writePrompt = `你是播客 Show Notes 写作专家。

根据以下核心素材，生成完整的 Show Notes。

${material}

[从逐字稿推断：如果有多位嘉宾，逐个换行列出，每行格式为「姓名：一句话介绍」]

🎙本期主播：
[从逐字稿推断：如果有多位主播，逐个换行列出，每行格式为「姓名：一句话介绍」]

人物识别规则（必须执行）：
- 先从逐字稿中识别本期有几位嘉宾、几位主播，再开始写
- 只要有2位及以上嘉宾，整篇按多人节目处理，不能偷懒写成单嘉宾
- ✨本期嘉宾必须覆盖全部嘉宾，不得遗漏任何一位
- 🎙本期主播必须覆盖全部主播，不得遗漏任何一位

性别判断规则（必须执行）：
从逐字稿中找自称词来判断嘉宾性别，不要靠名字猜（中文名字很多不分男女）：
- 嘉宾说"老娘" → 女性，用"她"
- 嘉宾说"老子" → 男性，用"他"
- 找不到自称词 → 看话题语境（美妆/首饰/生理特征等）判断
- 不要信主持人口语里的"他/她"（普通话口语他她不分）

标题规则：
- 26-31个字，不加序号
- 结尾是具体结果/数字/动作/金句，不能是问句
- 7个覆盖不同角度：反差型、结果型、悬念型、代入感型、破认知型、用户获得型、金句型
- 如果是多人节目，至少有部分标题要体现多人碰撞、群像关系或多视角，不要只盯着一个人写
- 好标题示例：「18线小镇女孩被原生家庭PUA，靠朋友圈+AI两年赚100万，实操干货直接抄」

反问句规则：
- 5条，每条约35字，语气自然口语化，不生硬
- 概括本期核心内容，让没听过的陌生人觉得"这个我也好奇"
- 好示例：「在AI把什么都免费化的时代，这个命理付费产品竟然让老外抢着买单，这是怎么做到的？」
- 坏示例：「她是如何从命理领域创业成功的」（陈述句、无代入感）

时间轴规则：
- 听众视角，每条是"我想知道的"，不是"嘉宾做了什么"
- 如果是多人节目，问题设计要能体现不同嘉宾的观点碰撞或分工，不要把多人内容压平成单人故事
- 好示例：「糊了之后能不能重新来过？普通人从零开始的第一步怎么走」
- 坏示例：「她是如何从明日之子转型到美妆博主的」

原始逐字稿（用于提取时间戳）：
${input}`;

                await streamAPI(
                    [{ role: 'user', content: writePrompt }],
                    delta => {
                        output.value += delta;
                        output.scrollTop = output.scrollHeight;
                    }
                );

            } catch (e) {
                output.value = `⚠️ 错误：${e.message}`;
            } finally {
                btn.disabled = false;
                btn.textContent = '生成 Show Notes';
            }
        }

        function copyOutput() {
            const text = document.getElementById('output').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制 ✓';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '复制全部';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
